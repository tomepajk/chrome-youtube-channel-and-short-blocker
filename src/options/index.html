<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>YT Distraction Blocker · Options</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <h1>YouTube Distraction Blocker</h1>
        <p class="subtitle">Manage your blocked channels and settings.</p>
      </header>

      <section class="card">
        <div class="toolbar">
          <input
            id="search"
            type="search"
            placeholder="Search blocked channels…"
            autocomplete="off"
          />
          <div class="toolbar-actions">
            <button id="select-all" type="button" class="btn btn-secondary">
              Select all
            </button>
            <button id="bulk-unblock" type="button" class="btn btn-danger" disabled>
              Unblock selected (<span id="selected-count">0</span>)
            </button>
          </div>
        </div>

        <div class="meta">
          <span><strong id="total-count">0</strong> blocked</span>
        </div>

        <ul id="blocklist" class="blocklist"></ul>
        <p id="empty-state" class="empty-state" hidden>
          No channels blocked yet.
        </p>
      </section>

      <section class="card">
        <h2>Backup &amp; restore</h2>
        <p class="muted">
          Export your blocklist and settings as JSON, or import from a previous
          export.
        </p>
        <div class="actions">
          <button id="export" type="button" class="btn btn-secondary">
            Export JSON
          </button>
          <label class="btn btn-secondary file-label">
            Import JSON…
            <input id="import" type="file" accept="application/json,.json" hidden />
          </label>
        </div>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="./options.ts"></script>
  </body>
</html>
